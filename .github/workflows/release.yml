name: Release

on:
  push:
    tags:
      - 'v[0-9]*'

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Stamp version into AssemblyInfo.cs
        shell: pwsh
        run: |
          $ver = "${{ env.VERSION }}.0"
          (Get-Content Properties\AssemblyInfo.cs) `
            -replace 'AssemblyVersion\("[\d\.]+"\)',     "AssemblyVersion(`"$ver`")" `
            -replace 'AssemblyFileVersion\("[\d\.]+"\)', "AssemblyFileVersion(`"$ver`")" |
          Set-Content Properties\AssemblyInfo.cs

      - name: Build
        run: |
          msbuild "Volume Mixer.csproj" `
            /p:Configuration=Release `
            /p:AssemblyVersion=${{ env.VERSION }} `
            /p:FileVersion=${{ env.VERSION }} `
            /v:minimal

      - name: Build installer
        uses: Minionguyjpro/Inno-Setup-Action@v1.2.2
        with:
          path: VolumeMixer.iss
          options: /DAppVersion=${{ env.VERSION }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Volume Mixer v${{ env.VERSION }}
          body: |
            ## What's new in v${{ env.VERSION }}

            - **Mute status overlay** — a small always-on-top indicator now sits in the corner of your screen showing whether your mic and audio are muted. Works over most games. Enable it and pick your monitor and corner in Settings.
            - **Cleaner settings screen** — settings are now grouped into sections so everything is easier to find.
          files: installer-output/VolumeMixer-Setup-v${{ env.VERSION }}.exe
