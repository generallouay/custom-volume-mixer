name: Release

on:
  push:
    tags:
      - 'v[0-9]*'

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build
        run: |
          msbuild "Volume Mixer.csproj" `
            /p:Configuration=Release `
            /p:AssemblyVersion=${{ env.VERSION }} `
            /p:FileVersion=${{ env.VERSION }} `
            /v:minimal

      - name: Build installer
        uses: Minionguyjpro/Inno-Setup-Action@v1.2.2
        with:
          path: VolumeMixer.iss
          options: /DAppVersion=${{ env.VERSION }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Volume Mixer v${{ env.VERSION }}
          body: |
            ## What's new

            - **Status overlay** — a small always-on-top widget shows your mic and audio mute state at a glance, works on top of most games (windowed and fullscreen-optimised modes)
            - **Organised settings page** — settings now split into three sections: General, Overlay, and Mic Mute Devices; overlay monitor and corner position controls only appear when the overlay is enabled
            - **Dark-themed dropdowns** — replaced the old Windows-style combo boxes with custom-drawn dark ones that match the rest of the UI
          files: installer-output/VolumeMixer-Setup-v${{ env.VERSION }}.exe
