name: Release

on:
  push:
    tags:
      - 'v[0-9]*'

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: packages
          key: nuget-${{ hashFiles('**/packages.config') }}
          restore-keys: nuget-

      - name: Restore NuGet packages
        run: nuget restore "Volume Mixer.csproj"

      - name: Build
        run: |
          msbuild "Volume Mixer.csproj" `
            /p:Configuration=Release `
            /p:AssemblyVersion=${{ env.VERSION }} `
            /p:FileVersion=${{ env.VERSION }} `
            /v:minimal

      - name: Build installer
        uses: Minionguyjpro/Inno-Setup-Action@v1.2.2
        with:
          path: VolumeMixer.iss
          options: /DAppVersion=${{ env.VERSION }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Volume Mixer v${{ env.VERSION }}
          generate_release_notes: true
          files: installer-output/VolumeMixer-Setup-v${{ env.VERSION }}.exe
